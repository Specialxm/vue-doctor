# Deploy static landing page from docs/ to GitHub Pages.
#
# Custom domain: vuedoctor.dev (see docs/CNAME)
# One-time setup: Settings → Pages → Source: GitHub Actions
# Then enable "Enforce HTTPS" once DNS + certificate are ready.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v5
